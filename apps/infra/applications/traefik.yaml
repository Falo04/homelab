apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
spec:
  project: infra-apps-project
  sources:
    - repoURL: https://traefik.github.io/charts
      chart: traefik
      targetRevision: v41.0.2
      helm:
        releaseName: traefik
        values: |
          deployment:
            replicas: 1

          # We define our own dashboard IngressRoute in the overlay (on websecure, with TLS),
          # so disable the chart's default dashboard route and just enable the API internally.
          ingressRoute:
            dashboard:
              enabled: false

          additionalArguments:
            - "--api.dashboard=true"
            - "--providers.kubernetesingress.ingressendpoint.publishedservice=traefik/traefik"
            - "--global.sendanonymoususage=false"
            - "--global.checknewversion=false"

          ports:
            web:
              port: 80
              expose:
                default: true
              exposedPort: 80
              http:
                redirections:
                  entryPoint:
                    to: websecure
                    scheme: https
            websecure:
              port: 443
              expose:
                default: true
              exposedPort: 443
              protocol: TCP
              http:
                middlewares:
                  - traefik-default-middlware-traefik@kubernetescrd
            # Dedicated entrypoint for tailnet traffic. 
            tailscale:
              port: 8443
              expose:
                default: true
              exposedPort: 8443
              protocol: TCP
              http:
                middlewares:
                  - traefik-default-middlware-traefik@kubernetescrd
            metrics:
              port: 9100
              expose:
                default: false

          service:
            type: ClusterIP

    - repoURL: https://github.com/Falo04/homelab.git
      targetRevision: main
      path: apps/infra/traefik

    # Standalone Tailscale node fronting Traefik on the tailnet.
    - repoURL: https://github.com/Falo04/homelab.git
      targetRevision: main
      path: charts/tailscale-node
      helm:
        releaseName: traefik-tailscale
        valuesObject:
          pod:
            fullnameOverride: tailscale
          tailscale:
            hostname: traefik
            tcpForward:
              - port: 443
                targetPort: 8443
                service: traefik
              - port: 80
                targetPort: 80
                service: traefik
          vault:
            authRef: vault-k8s
            mount: k3s-infra
            path: traefik/tailscale
  destination:
    server: https://kubernetes.default.svc
    namespace: traefik
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
