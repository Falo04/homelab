apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: coredns
  namespace: argocd
spec:
  project: infra-apps-project
  source:
    repoURL: https://github.com/Falo04/homelab.git
    targetRevision: main
    path: apps/infra/coredns
  destination:
    server: https://kubernetes.default.svc
    namespace: coredns
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
