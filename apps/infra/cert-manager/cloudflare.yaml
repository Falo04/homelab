# Cloudflare API token, stored in Vault and synced into the cert-manager namespace so the
# letsencrypt-dns ClusterIssuer can read it.
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: vault-cloudflare-secret
  namespace: cert-manager
spec:
  vaultAuthRef: vault-k8s
  mount: k3s-infra
  type: kv-v2
  path: cert-manager/cloudflare
  refreshAfter: 1h
  destination:
    create: true
    name: cloudflare-secret
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vso-auth
  namespace: cert-manager
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  name: vault-k8s
  namespace: cert-manager
spec:
  vaultConnectionRef: vault-secrets/vault
  method: kubernetes
  mount: kubernetes
  kubernetes:
    role: vso
    serviceAccount: vso-auth
    audiences:
      - vault
