# Namespace-level Vault access for the traefik namespace (Kubernetes auth).
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vso-auth
  namespace: traefik
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  name: vault-k8s
  namespace: traefik
spec:
  vaultConnectionRef: vault-secrets/vault
  method: kubernetes
  mount: kubernetes
  kubernetes:
    role: vso
    serviceAccount: vso-auth
    audiences:
      - vault
