apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: traefik-dashboard-cert
  namespace: traefik
spec:
  secretName: traefik-dashboard-tls
  commonName: traefik-k8s.int.felixwallner.com
  dnsNames:
    - traefik-k8s.int.felixwallner.com
  issuerRef:
    name: letsencrypt-dns
    kind: ClusterIssuer
  privateKey:
    algorithm: ECDSA
    size: 256
    encoding: PKCS8
