# Namespace that holds the Vault auth wiring. Labelled with the
# "restricted" Pod Security Standard so any pod scheduled here
# must run non-root with a locked-down security context.
apiVersion: v1
kind: Namespace
metadata:
  name: vault-secrets
  labels:
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
