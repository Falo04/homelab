# The client identity. VaultAuth (vault-auth.yaml) presents this SA's token to
# Vault to log in; Vault maps it to the "vso" role and hands back a Vault token.
# This is *who logs into Vault*, not the credential Vault uses to verify tokens.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vso-auth
  namespace: vault-secrets
