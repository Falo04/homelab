services:
  vault:
    image: hashicorp/vault:1.13.3
    container_name: vault
    hostname: vault
    command: server
    cap_add:
      - IPC_LOCK
    volumes:
      - ./vault1/config.hcl:/vault/config/config.hcl
      - ./vault1/data:/vault/data
    networks:
      - external
    labels:
      - "traefik.enable=true"
      # Vault is published via the Cloudflare tunnel, so Traefik must reach its
      # backend over the external network (overrides the global docker provider
      # network default of `internal`).
      - "traefik.docker.network=external"
      - "traefik.http.routers.vault.rule=Host(`vault.${ROOT_DOMAIN}`)"
      - "traefik.http.routers.vault.entrypoints=websecure"
      - "traefik.http.routers.vault.tls=true"
      # No wildcard — per-host cert for vault.${ROOT_DOMAIN} via DNS-01.
      - "traefik.http.routers.vault.tls.certresolver=letsencrypt"
      - "traefik.http.services.vault.loadbalancer.server.port=8200"

networks:
  external:
    external: true
