apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tailscale-node.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tailscale-node.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "tailscale-node.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tailscale-node.selectorLabels" . | nindent 8 }}
      {{- with .Values.pod.annotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "tailscale-node.fullname" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: tailscale
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: TS_HOSTNAME
              value: {{ .Values.tailscale.hostname | quote }}
            - name: TS_KUBE_SECRET
              value: {{ include "tailscale-node.fullname" . }}-state
            - name: TS_USERSPACE
              value: "true"
            - name: TS_AUTH_ONCE
              value: "true"
            - name: TS_SERVE_CONFIG
              value: /etc/ts-serve/serve
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "tailscale-node.fullname" . }}-auth
                  key: TS_AUTHKEY
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_UID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
          volumeMounts:
            - name: serve-config
              mountPath: /etc/ts-serve
              readOnly: true
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: serve-config
          configMap:
            name: {{ include "tailscale-node.fullname" . }}-config
