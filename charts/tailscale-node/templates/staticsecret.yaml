apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: {{ include "tailscale-node.fullname" . }}-auth
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tailscale-node.labels" . | nindent 4 }}
spec:
  vaultAuthRef: {{ required "vault.authRef is required: name of an existing VaultAuth in the release namespace" .Values.vault.authRef }}
  type: kv-v2
  mount: {{ .Values.vault.mount }}
  path: {{ .Values.vault.path }}
  refreshAfter: {{ .Values.vault.refreshAfter }}
  destination:
    create: true
    name: {{ include "tailscale-node.fullname" . }}-auth
