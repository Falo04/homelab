services:
  traefik:
    image: traefik:v3.7
    container_name: traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      # Tailscale-exposed services are routed over this network via tsadmin.
      internal: {}
      # Cloudflare-tunnel-exposed services are routed over this network via
      # websecure. Traefik gets a fixed IP here so websecure can bind to exactly
      # this address — see the entrypoint below. Must match the subnet created by
      # the justfile `ensure-net` recipe.
      external:
        ipv4_address: 172.30.0.2
        # cloudflared resolves the tunnel's Service URL via Docker's embedded DNS.
        # Aliasing Traefik as vault.${ROOT_DOMAIN} means a Service URL of
        # `https://vault.${ROOT_DOMAIN}:8443` resolves here (not the public tunnel),
        # and cloudflared sends that as SNI — so Traefik serves the matching
        # Let's Encrypt cert and cloudflared verifies it without any origin TLS
        # overrides in the (minimal) tunnel dashboard.
        aliases:
          - "vault.${ROOT_DOMAIN}"
    # Only tsadmin (:443) and web (:80) are published on the host, and only on the
    # Tailscale IP — nothing listens on LAN/public interfaces. The websecure
    # entrypoint is NOT published; it binds solely to the external-network IP, so
    # only the cloudflared tunnel can reach it. ACME uses DNS-01, so no inbound
    # ports are needed.
    ports:
      # HTTP → redirects to https on tsadmin (:8443)
      - "${TAILSCALE_IP}:80:80"
      # tsadmin: the only TLS entrypoint, serving all internal services
      - "${TAILSCALE_IP}:443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - acme:/etc/traefik/acme
      - traefik:/config
      - cloudflare:/cloudflare
    command:
      # EntryPoints
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=tsadmin"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.permanent=true"
      # Tailscale-only entrypoint (published only on the Tailscale IP) — the sole
      # TLS entrypoint; every service is reachable exclusively over the tailnet.
      - "--entrypoints.tsadmin.address=:443"
      - "--entrypoints.tsadmin.http.tls=true"
      - "--entrypoints.tsadmin.http.tls.certresolver=letsencrypt"
      # Cloudflare-tunnel-only entrypoint. Bound to Traefik's fixed IP on the
      # external network (not :443/0.0.0.0), so it listens ONLY on the tunnel-
      # facing interface — a call to the host/LAN/Tailscale IP is refused. The
      # cloudflared container (same external network) is the only client.
      - "--entrypoints.websecure.address=172.30.0.2:8443"
      - "--entrypoints.websecure.http.tls=true"
      - "--entrypoints.websecure.http.tls.certresolver=letsencrypt"
      - "--certificatesresolvers.letsencrypt.acme.email=felixwallner0@gmail.com"
      - "--certificatesresolvers.letsencrypt.acme.storage=/etc/traefik/acme/letsencrypt.json"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge.provider=cloudflare"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge.delaybeforecheck=5"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge.resolvers=8.8.8.8:53"
      # Providers
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=internal"
      # API & Dashboard
      - "--api.dashboard=true"
      - "--api.insecure=false"
      # Observability
      - "--log.level=INFO"
      - "--accesslog=true"
      - "--metrics.prometheus=true"
    # Traefik Dynamic configuration via Docker labels
    labels:
      # Enable self‑routing
      - "traefik.enable=true"
      # Dashboard router — bound to the tsadmin entrypoint, which only listens
      # on the Tailscale IP, so the dashboard is reachable only over the tailnet.
      - "traefik.http.routers.dashboard.rule=Host(`traefik.${INT_ROOT_DOMAIN}`)"
      - "traefik.http.routers.dashboard.entrypoints=tsadmin"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.tls=true"
      # Cert resolver must be on the router — a docker router's tls=true does NOT
      # inherit the entrypoint's certResolver. No wildcard: Traefik issues a
      # per-host cert for traefik.${INT_ROOT_DOMAIN} straight from the Host rule.
      - "traefik.http.routers.dashboard.tls.certresolver=letsencrypt"
    secrets:
      - cf_token
    environment:
      - CLOUDFLARE_DNS_API_TOKEN_FILE=/run/secrets/cf_token
      - CLOUDFLARE_HTTP_TIMEOUT=${HTTP_TIMEOUT}
      - CLOUDFLARE_POLLING_INTERVAL=${POLLING_INTERVAL}
      - CLOUDFLARE_PROPAGATION_TIMEOUT=${PROPAGATION_TIMEOUT}
      - CLOUDFLARE_TTL=${TTL}

  tunnel:
    container_name: cloudflared-tunnel
    image: cloudflare/cloudflared
    restart: unless-stopped
    command: tunnel run
    networks:
      - external
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}

networks:
  internal:
    external: true
  # Created by the justfile `ensure-net` recipe: subnet 172.30.0.0/24 with the
  # dynamic pool restricted to .128–.254, leaving 172.30.0.2 free for Traefik's
  # static bind above.
  external:
    external: true

volumes:
  acme:
  traefik:
  cloudflare:

secrets:
  cf_token:
    file: cloudflare-token.txt
