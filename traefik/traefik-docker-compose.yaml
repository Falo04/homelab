services:
  traefik:
    image: traefik:v3.7
    container_name: traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - internal
    ports:
      # Public: web + websecure listen on every interface (LAN/public/tailnet)
      - "80:80"
      - "443:443"
      # Admin: the tsadmin entrypoint (:8443) is published ONLY on the Tailscale
      # IP, so the dashboard is reachable exclusively over the tailnet.
      - "${TAILSCALE_IP}:8443:8443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - acme:/etc/traefik/acme
      - traefik:/config
      - cloudflare:/cloudflare
    command:
      # EntryPoints
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.permanent=true"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.websecure.http.tls=true"
      # Lets encrypt setup
      - "--entrypoints.websecure.http.tls.certresolver=letsencrypt"
      # Public wildcard cert for every *.felixwallner.com host on this entrypoint
      - "--entrypoints.websecure.http.tls.domains[0].main=${ROOT_DOMAIN}"
      - "--entrypoints.websecure.http.tls.domains[0].sans=*.${ROOT_DOMAIN}"
      - "--entrypoints.webinternal.address=:82"
      # Tailscale-only admin entrypoint (published only on the Tailscale IP)
      - "--entrypoints.tsadmin.address=:8443"
      - "--entrypoints.tsadmin.http.tls=true"
      - "--entrypoints.tsadmin.http.tls.certresolver=letsencrypt"
      # Internal wildcard cert for every *.int.felixwallner.com host on this entrypoint
      - "--entrypoints.tsadmin.http.tls.domains[0].main=${INT_ROOT_DOMAIN}"
      - "--entrypoints.tsadmin.http.tls.domains[0].sans=*.${INT_ROOT_DOMAIN}"
      - "--certificatesresolvers.letsencrypt.acme.email=felixwallner0@gmail.com"
      - "--certificatesresolvers.letsencrypt.acme.storage=/etc/traefik/acme/letsencrypt.json"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge.provider=cloudflare"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge.delaybeforecheck=5"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge.resolvers=8.8.8.8:53"
      # Providers
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=internal"
      # API & Dashboard
      - "--api.dashboard=true"
      - "--api.insecure=false"
      # Observability
      - "--log.level=INFO"
      - "--accesslog=true"
      - "--metrics.prometheus=true"
    # Traefik Dynamic configuration via Docker labels
    labels:
      # Enable self‑routing
      - "traefik.enable=true"
      # Dashboard router — bound to the tsadmin entrypoint, which only listens
      # on the Tailscale IP, so the dashboard is reachable only over the tailnet.
      - "traefik.http.routers.dashboard.rule=Host(`traefik.${INT_ROOT_DOMAIN}`)"
      - "traefik.http.routers.dashboard.entrypoints=tsadmin"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.tls=true"
    secrets:
      - cf_token
    environment:
      - CLOUDFLARE_DNS_API_TOKEN_FILE=/run/secrets/cf_token
      - CLOUDFLARE_HTTP_TIMEOUT=${HTTP_TIMEOUT}
      - CLOUDFLARE_POLLING_INTERVAL=${POLLING_INTERVAL}
      - CLOUDFLARE_PROPAGATION_TIMEOUT=${PROPAGATION_TIMEOUT}
      - CLOUDFLARE_TTL=${TTL}

  # Whoami application
  whoami:
    image: traefik/whoami
    container_name: whoami
    restart: unless-stopped
    networks:
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.whoami.rule=Host(`whoami.${INT_ROOT_DOMAIN}`)"
      - "traefik.http.routers.whoami.entrypoints=tsadmin"
      - "traefik.http.routers.whoami.tls=true"

networks:
  internal:
    external: true

volumes:
  acme:
  traefik:
  cloudflare:

secrets:
  cf_token:
    file: cloudflare-token.txt
